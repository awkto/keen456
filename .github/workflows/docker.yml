name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true
      multiarch:
        description: 'Build ARM64 too'
        type: boolean
        default: true

env:
  IMAGE: awkto/keen456

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract tag metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "is_pre=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_pre=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.multiarch }}" == "true" ]] \
             || [[ "${{ github.event_name }}" == "push" ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push (prerelease)
        if: steps.meta.outputs.is_pre == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.meta.outputs.platforms }}
          build-args: VERSION=${{ steps.meta.outputs.tag }}
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}

      - name: Build and push (release)
        if: steps.meta.outputs.is_pre == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.meta.outputs.platforms }}
          build-args: VERSION=${{ steps.meta.outputs.tag }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
