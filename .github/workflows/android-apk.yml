name: Build Android APK

# Package the web app (Capacitor WebView) into a signed APK.
# Tag `android-v*.*.*` to cut a release; manual dispatch for iteration.
on:
  push:
    tags:
      - 'android-v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for softprops/action-gh-release

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: android/package-lock.json

      - name: Install Capacitor deps
        working-directory: android
        run: npm ci

      - name: Bundle web app into www
        working-directory: android
        run: bash build-www.sh

      - name: Sync Capacitor to native project
        working-directory: android
        run: npx cap sync android

      - name: Decode signing keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keen456-release.keystore"
            echo "file=$RUNNER_TEMP/keen456-release.keystore" >> "$GITHUB_OUTPUT"
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded — building a signed release APK."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — falling back to an unsigned debug APK."
          fi

      - name: Assemble APK
        id: assemble
        working-directory: android/android
        env:
          KEYSTORE_FILE: ${{ steps.keystore.outputs.file }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/android-v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/android-v}
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.keystore.outputs.present }}" = "true" ]; then
            # versionCode = run number (every build upgrades); versionName = tag/dev-sha.
            # Signing injected via gradle props so build.gradle carries no keystore.
            ./gradlew --no-daemon assembleRelease \
              -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
              -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD" \
              -Pandroid.injected.version.code="$GITHUB_RUN_NUMBER" \
              -Pandroid.injected.version.name="$VERSION"
            echo "apk=android/android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            ./gradlew --no-daemon assembleDebug
            echo "apk=android/android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package APK with version
        id: apk
        run: |
          VERSION="${{ steps.assemble.outputs.version }}"
          if [ "${{ steps.assemble.outputs.signed }}" = "true" ]; then
            DEST="keen456-${VERSION}.apk"
          else
            DEST="keen456-${VERSION}-debug.apk"
          fi
          cp "${{ steps.assemble.outputs.apk }}" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "name=${DEST%.apk}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          body: |
            ## Sideload

            A Capacitor WebView port of the Commander Keen 4·5·6 web app — the same
            emulator and touch UI, packaged as a native Android app.

            1. On your phone, open the APK link below and tap **Download**.
            2. Open the downloaded file. If Android asks, allow "install unknown apps" for your browser once.
            3. Tap **Install**.

            Keen 4 shareware plays out of the box; Keen 1 shareware (and Keen 4 shareware) plays out of the box;
            commercial episodes are bring-your-own data, same as the website.

            Signed with the stable keen456 release key (updates earlier release-signed installs in place).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
