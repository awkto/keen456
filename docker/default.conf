server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # always re-fetch the manifest so newly mounted games show up after a restart
    location = /games/manifest.json {
        add_header Cache-Control "no-store";
    }

    # Server-side save slots (docker/saves-api.py). Present only in the container,
    # so the client probes /api/health to decide whether to offer the feature
    # (on GitHub Pages / static hosts this 404s and the feature stays hidden).
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 16m;   # save bundles are ~1 MB; default 1m would 413
    }
}
