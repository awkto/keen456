server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # always re-fetch the manifest so newly mounted games show up after a restart
    location = /games/manifest.json {
        add_header Cache-Control "no-store";
    }
}
